---
layout: default
---
<section class="blog-post">
  <div style="margin-bottom: 2rem;">
    <a href="/blog.html"
      style="color: #64ffda; text-decoration: none; font-family: 'Fira Code', monospace; font-size: 0.9rem;">← Back to
      Blog</a>
  </div>
  <h1>{{ page.title }}</h1>
  <p style="color: #8892b0; font-family: 'Fira Code', monospace; font-size: 0.9rem; margin-bottom: 2rem;">
    {{ page.date | date: "%B %-d, %Y" }}
  </p>

  <div class="post-content">
    {{ content }}
  </div>
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "BlogPosting",
      "mainEntityOfPage": {
        "@type": "WebPage",
        "@id": "https://swaritshukla.me{{ page.url | relative_url }}"
      },
      "headline": "{{ page.title | escape }}",
      "datePublished": "{{ page.date | date_to_xmlschema }}",
      "description": "{{ page.excerpt | strip_html | strip_newlines | truncate: 160 | escape }}",
      "author": {
        "@type": "Person",
        "name": "Swarit Shukla",
        "url": "https://swaritshukla.me"
      }
    }
    </script>
</section>

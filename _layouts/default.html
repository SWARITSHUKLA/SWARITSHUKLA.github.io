<body>
    <div class="chiaroscuro-bg"></div>
    <style>
        .chiaroscuro-bg {
            position: fixed;
            top: -25%;
            left: -25%;
            width: 150%;
            height: 150%;
            z-index: -1; /* Keeps it behind your main content */
            pointer-events: none; /* Lets clicks pass through to your links */
            /* Significantly increased opacity so it is actually visible */
            background: radial-gradient(circle at 30% 30%, rgba(200, 150, 80, 0.25), transparent 60%),
                        radial-gradient(circle at 70% 70%, rgba(100, 80, 140, 0.15), transparent 70%);
            /* 15s for noticeable but subtle movement */
            animation: drift-light 10s infinite alternate ease-in-out;
        }
        
        @keyframes drift-light {
            0%   { transform: translate(0, 0) scale(1); }
            50%  { transform: translate(5%, -5%) scale(1.1); }
            100% { transform: translate(-5%, 5%) scale(1); }
        }
        
        /* Keep the body background deep black to maintain the dark mode */
        body {
            background-color: #0a0a0a;
        }
    </style>
